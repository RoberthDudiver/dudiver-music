server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html y rutas SPA: revalidar siempre (así referencia los assets nuevos).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Archivos que controlan versión/arranque: no cachear.
    location = /version.json       { add_header Cache-Control "no-store, must-revalidate"; }
    location = /manifest.webmanifest { add_header Cache-Control "no-store"; }
    # El SW NO debe quedar inmutable, si no nunca se actualiza.
    location = /service-worker.js  { add_header Cache-Control "no-cache"; }

    # Mis assets propios SIN fingerprint (player.js, jsmediatags, app.css):
    # revalidar siempre para que las actualizaciones lleguen (304 si no cambió).
    # ^~ gana sobre el regex de abajo.
    location ^~ /js/  { add_header Cache-Control "no-cache"; }
    location ^~ /css/ { add_header Cache-Control "no-cache"; }

    # Assets con fingerprint (Blazor): cache largo e inmutable.
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM: asegurar el content-type SIN pisar el mime.types global.
    location ~ \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Binarios de Blazor con fingerprint + imágenes/fuentes (casi nunca cambian).
    location ~* \.(dll|dat|blat|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 256;
}
