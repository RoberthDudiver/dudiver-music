server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # version.json y manifest: nunca cachear (para el auto-update)
    location = /version.json {
        add_header Cache-Control "no-store, must-revalidate";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store";
    }

    # Assets con fingerprint: cache largo e inmutable
    location /_framework/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(js|css|wasm|dll|dat|blat|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM content type
    types { application/wasm wasm; }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_min_length 256;
}
